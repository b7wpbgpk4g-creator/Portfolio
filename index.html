<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Beredo - Copywriter Portfolio</title>
    <meta name="description"
        content="Martin Beredo is a copywriter and screenwriter specializing in creative advertising campaigns. View his portfolio of work for brands like Apple, Clash of Clans, Kyrgyzstan Tourism, Substack, and more.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖋️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bungee+Spice&family=Monoton&family=Ewert&family=Creepster&family=Special+Elite&family=Slackey&family=Permanent+Marker&family=UnifrakturMaguntia&family=Nosifer&family=Piedra&family=Metal+Mania&family=Henny+Penny&family=Shojumaru&family=Gloria+Hallelujah&family=Bangers&family=Fredericka+the+Great&family=Finger+Paint&family=Frijole&family=Eater&family=Cabin+Sketch&family=Arizonia&family=Codystar&family=Rubik+Moonrocks&family=Rubik+Burned&family=Rubik+Glitch&family=Fascinate+Inline&family=Londrina+Sketch&family=Rye&family=Black+Ops+One&family=Staatliches&family=Faster+One&family=Audiowide&family=Bungee+Shade&family=Flavors&family=Rubik+Spray+Paint&family=Jolly+Lodger&family=New+Rocker&family=Butcherman&family=Fontdiner+Swanky&family=Jacques+Francois+Shadow&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #f4f1ea;
            --ink-color: #1a1a1a;
            --bg-texture: url("https://www.transparenttextures.com/patterns/felt.png");
        }

        [data-theme="dark"] {
            --paper-color: #1a1a1a;
            --ink-color: #f4f1ea;
            --bg-texture: url("https://www.transparenttextures.com/patterns/dark-matter.png");
        }

        body {
            background-color: var(--paper-color);
            background-image: var(--bg-texture);
            font-family: 'Courier Prime', monospace;
            color: var(--ink-color);
            line-height: 1.2;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: var(--paper-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.2em;
        }

        .theme-toggle {
            cursor: pointer;
            width: 20px;
            height: 20px;
            border: 1px solid var(--ink-color);
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            background-color: var(--paper-color);
            display: inline-block;
        }

        .theme-toggle:hover {
            opacity: 0.6;
        }

        .theme-toggle.moon {
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--paper-color) 25%, var(--ink-color) 25%);
        }

        .theme-toggle.sun {
            border-radius: 50%;
            background-color: var(--ink-color);
            box-shadow:
                0 -8px 0 -6px var(--ink-color),
                0 8px 0 -6px var(--ink-color),
                -8px 0 0 -6px var(--ink-color),
                8px 0 0 -6px var(--ink-color),
                -6px -6px 0 -6px var(--ink-color),
                6px -6px 0 -6px var(--ink-color),
                -6px 6px 0 -6px var(--ink-color),
                6px 6px 0 -6px var(--ink-color);
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 2rem 4rem;
            width: 100%;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .top-nav {
            display: flex;
            gap: 2rem;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.2em;
        }

        .nav-link {
            position: relative;
            transition: 0.2s;
        }

        .nav-link:hover::before {
            content: '>';
            position: absolute;
            left: -1.2rem;
        }

        .scene-card {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .scene-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] .scene-card:hover {
            box-shadow: 0 12px 24px rgba(255, 255, 255, 0.1);
        }

        #main-content-area {
            transition: opacity 0.4s ease;
            min-height: 100vh;
        }

        .fade-out {
            opacity: 0;
        }

        .media-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 5rem;
        }

        .project-media {
            max-width: 100%;
            height: auto;
            max-height: 80vh;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            cursor: zoom-in;
            display: block;
        }

        [data-theme="dark"] .project-media {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .project-media.zoom-reveal {
            max-height: 95vh;
        }

        .project-media.contained-vertical {
            max-height: 75vh;
            width: auto;
        }

        .project-media.expanded-horizontal {
            width: 100%;
            max-height: none;
        }

        /* Vimeo embed wrapper */
        .vimeo-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
        }

        .vimeo-embed {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 */
            height: 0;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .vimeo-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 100;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
        }

        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            padding: 1rem;
            user-select: none;
        }

        #name-heading {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            transition: transform 0.1s;
            text-align: left;
            position: relative;
        }

        @keyframes shatter {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--r));
                opacity: 0;
            }
        }

        @keyframes rebuild {
            0% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--r));
                opacity: 0;
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes subtlePulse {
            0% {
                opacity: 1;
                text-shadow: none;
            }

            50% {
                opacity: 0.8;
                text-shadow: 0 0 12px currentColor;
            }

            100% {
                opacity: 1;
                text-shadow: none;
            }
        }

        .easter-egg-hint {
            animation: subtlePulse 3s infinite ease-in-out;
        }

        @keyframes wiggle {

            0%,
            90% {
                transform: translate(0, 0) rotate(0deg);
            }

            92% {
                transform: translate(-1px, 0px) rotate(-3deg);
            }

            94% {
                transform: translate(1px, -1px) rotate(4deg);
            }

            96% {
                transform: translate(-1px, 1px) rotate(-4deg);
            }

            98% {
                transform: translate(1px, 1px) rotate(3deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        .wiggle-letter {
            display: inline-block;
            animation: wiggle infinite ease-in-out;
        }

        @keyframes spinDisappear {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }

            100% {
                transform: rotate(720deg) scale(0);
                opacity: 0;
            }
        }

        @keyframes spinReappear {
            0% {
                transform: rotate(720deg) scale(0);
                opacity: 0;
            }

            100% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes waveEffect {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .inter-text {
            font-family: 'Inter', sans-serif;
            letter-spacing: normal;
        }

        @keyframes neonFlicker {

            0%,
            19%,
            21%,
            23%,
            25%,
            54%,
            56%,
            100% {
                opacity: 1;
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            }

            20%,
            24%,
            55% {
                opacity: 0.4;
                text-shadow: none;
            }
        }

        @keyframes gravityDrop {
            0% {
                transform: translateY(-200px) rotate(0deg);
                opacity: 0;
            }

            50% {
                transform: translateY(0) rotate(180deg);
                opacity: 1;
            }

            65% {
                transform: translateY(-30px) rotate(200deg);
            }

            80% {
                transform: translateY(0) rotate(340deg);
            }

            90% {
                transform: translateY(-10px) rotate(355deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
                opacity: 1;
            }
        }

        @keyframes elasticBounce {
            0% {
                transform: scale(1, 1);
            }

            25% {
                transform: scale(1.2, 0.8);
            }

            50% {
                transform: scale(0.8, 1.2);
            }

            75% {
                transform: scale(1.1, 0.9);
            }

            100% {
                transform: scale(1, 1);
            }
        }

        @keyframes magneticPull {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px) rotate(-5deg);
            }

            75% {
                transform: translateX(10px) rotate(5deg);
            }
        }

        .cursor-trail {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: trailFade 0.8s ease-out forwards;
        }

        @keyframes trailFade {
            0% {
                opacity: 0.8;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        #subtitle-heading {
            cursor: pointer;
            display: inline-block;
            line-height: 1.4;
            text-align: left;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .site-header {
                flex-direction: column;
                padding: 1.5rem 1.5rem;
                gap: 1.5rem;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .top-nav {
                gap: 1.5rem;
                font-size: 0.75rem;
            }

            .nav-link:hover::before {
                left: -0.8rem;
            }

            #name-heading {
                font-size: 1.75rem;
            }

            #subtitle-heading {
                font-size: 0.65rem;
            }

            .project-media {
                max-height: 60vh;
            }

            .media-container {
                margin-bottom: 3rem;
            }

            .lightbox-arrow {
                font-size: 2rem;
                padding: 0.5rem;
            }

            #lightbox img {
                max-width: 95%;
                max-height: 90%;
            }

            .loading-text {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <div class="loading-text">LOADING...</div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-arrow left-0 ml-8" onclick="changeLightbox(-1, event)">&#10094;</span>
        <img id="lightbox-img" src="" alt="Fullscreen view" loading="lazy">
        <span class="lightbox-arrow right-0 mr-8" onclick="changeLightbox(1, event)">&#10095;</span>
        <div class="absolute top-8 right-8 text-white text-3xl cursor-pointer" onclick="closeLightbox()">&times;</div>
    </div>

    <div id="main-content-area"></div>

    <script>
        const getTheme = () => localStorage.getItem('theme') || 'light';
        const setTheme = (theme) => {
            localStorage.setItem('theme', theme);
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeIcon();
        };

        function updateThemeIcon() {
            const toggle = document.querySelector('.theme-toggle');
            if (toggle) {
                toggle.className = 'theme-toggle ' + (getTheme() === 'light' ? 'moon' : 'sun');
            }
        }

        setTheme(getTheme());

        function toggleTheme() {
            setTheme(getTheme() === 'light' ? 'dark' : 'light');
        }

        function navigateTo(url, e) {
            if (e) e.preventDefault();
            const loader = document.getElementById('loading-screen');
            loader.style.display = 'flex';
            // Force reflow
            void loader.offsetWidth;
            loader.classList.remove('fade-out');

            setTimeout(() => {
                window.location.href = url;
            }, 500);
        }

        const projects = [
            {
                title: "NETFLIX RAIDS",
                subtitle: "Client: Clash of Clans",
                thumbnail: "Clash_Thumbnail.png",
                credit: 'Art Director: Daniel Arougheti',
                script: `<p class="mb-6 leading-relaxed"><strong>Awards:</strong><br>One Show Young Ones ADC Shortlist</p><p class="mb-6 leading-relaxed">Clash just raided Netflix.<br>Netflix built a wall to stop password sharing, so Clash of Clans broke it down. “Netflix Raids” is a game mode where players raid Netflix’s in-game base to unlock real movies, shows, and a free trial, turning locked-out subscribers into Clashers. The campaign then spilled into real life, with Clash characters storming Netflix’s offices, hijacking their billboards, and taking over their Instagram.</p>`,
                media: [
                    { type: 'vimeo', src: 'https://player.vimeo.com/video/1175479391?autoplay=0&title=0&byline=0&portrait=0', group: 'Case Study Video' },
                    { type: 'image', src: 'Big_Board.png', orientation: 'h', group: 'Big Board' },
                    { type: 'image', src: 'Outdoor_1.png', orientation: 'h', group: 'OOH' },
                    { type: 'image', src: 'Outdoor_2.png', orientation: 'h', group: 'OOH' },
                    { type: 'image', src: 'Outdoor_3.png', orientation: 'h', group: 'OOH' },
                    { type: 'image', src: 'Netflix_billboard.png', orientation: 'h', group: 'Billboard' }
                ]
            },
            {
                title: "ORGANIC INTELLIGENCE",
                subtitle: "Apple",
                thumbnail: "Logo.png",
                credit: 'Art Director: Daniel Arougheti',
                script: `<p class="mb-6 leading-relaxed">Data centers are an environmental disaster, burning through power and water to keep the cloud running. Apple's "Organic Intelligence" reimagines storage from the ground up: the world's first mushroom data center, where living mycelium networks hold our data and grow from the very soil that traditional servers poison. We've always said Think Different. Now we store data different.</p>`,
                media: [
                    { type: 'vimeo', src: 'https://player.vimeo.com/video/1189045632?autoplay=0&title=0&byline=0&portrait=0', group: 'Case Study Video' },
                    { type: 'image', src: 'Single_Board.png', orientation: 'h', group: 'Big Board' },
                    { type: 'image', src: 'OOH1.png', orientation: 'h', group: 'Billboard' },
                    { type: 'image', src: 'OOH2.png', orientation: 'h', group: 'Billboard' },
                    { type: 'image', src: 'OOH3.png', orientation: 'h', group: 'Billboard' },
                    { type: 'image', src: 'Social2B.png', orientation: 'h', group: 'Social Media' },
                    { type: 'image', src: 'Social2A.png', orientation: 'h', group: 'Social Media' }
                ]
            },
            {
                title: "BAD REVIEWS, BEAUTIFUL COUNTRY",
                subtitle: "Kyrgyzstan Tourism",
                thumbnail: "170711-_JBG0349-1.jpg",
                credit: 'Art Director: Daniel Arougheti',
                script: `<p class="mb-6 leading-relaxed">Kyrgyzstan's raw, untouched beauty is for everyone. The only travelers who wouldn't appreciate it are those with closed eyes.</p>`,
                media: [
                    { type: 'image', src: 'Kyrg redo 3.jpeg', orientation: 'h', group: 'Print' },
                    { type: 'image', src: 'Kyrg redo 2.jpeg', orientation: 'h', group: 'Print' },
                    { type: 'image', src: 'Kyrg redo 1.jpeg', orientation: 'h', group: 'Print' }
                ]
            },
            {
                title: "THE HUMAN REVOLUTION",
                subtitle: "Substack",
                thumbnail: "Final_Substack.jpg",
                script: `<p class="mb-6 leading-relaxed">AI writing has taken over the internet. Substack provides a platform for those fighting on the side of humanity for the sake of the written word.</p>`,
                media: [
                    { type: 'image', src: 'Final_Substack.jpg', group: 'Print' }, { type: 'image', src: 'Final_Substack2.jpg', group: 'Print' }, { type: 'image', src: 'Final_Substack3.jpg', group: 'Print' },
                    { type: 'image', src: 'Final_Substack4.jpg', group: 'Print' }, { type: 'image', src: 'Final_Substack5.jpg', group: 'Print' }, { type: 'image', src: 'Final_Substack6.jpg', group: 'Print' }
                ]
            },
            {
                title: "ANALOG SOUL",
                subtitle: "1 by One Turntable",
                thumbnail: "Turntable_shelves copy.png",
                script: `<p class="mb-6 leading-relaxed">Vinyl records are damn expensive, but the 1 by One turntable's bluetooth connectivity gives users that rich vinyl sound without needing a large record collection.</p>`,
                media: [
                    { type: 'image', src: 'Three_ads_Page_2.jpg', group: 'Print' }, { type: 'image', src: 'Three_ads_Page_1.jpg', group: 'Print' }, { type: 'image', src: 'Three_ads_Page_3.jpg', group: 'Print' }
                ]
            },
            {
                title: "THE ZOOM REVEAL",
                subtitle: "Canon Powershot",
                thumbnail: "canon_powershot.jpg",
                script: `<p class="mb-6 leading-relaxed">The ugliest truths are often the hardest to see. But with 50x zoom on the Canon Powershot camera, you can see it all - even the stuff you might not want to see.</p>`,
                media: [
                    { type: 'image', src: 'Campaign One Images_Page_3.jpg', group: 'Print' },
                    { type: 'image', src: 'Campaign One Images_Page_4.jpg', group: 'Print' }, { type: 'image', src: 'Campaign One Images_Page_5.jpg', group: 'Print' }, { type: 'image', src: 'Campaign One Images_Page_6.jpg', group: 'Print' },
                    { type: 'image', src: 'Campaign One Images_Page_7.jpg', group: 'Print' }
                ]
            }
        ];

        let currentMediaList = [];
        let currentMediaIndex = 0;

        const originalNameText = "Martin Beredo";
        let currentScrambledColors = null;

        function getWiggledNameHTML() {
            return originalNameText.split('').map((char, i) => {
                if (char === ' ') return ' ';
                const color = currentScrambledColors ? currentScrambledColors[i] : 'inherit';
                const delay = (Math.random() * -15).toFixed(2);
                const duration = (5 + Math.random() * 10).toFixed(2);
                return `<span class="wiggle-letter" style="color:${color}; animation-delay: ${delay}s; animation-duration: ${duration}s;">${char}</span>`;
            }).join('');
        }

        const crazyFonts = ['Bungee Spice', 'Monoton', 'Ewert', 'Creepster', 'Special Elite', 'Slackey', 'Permanent Marker', 'UnifrakturMaguntia', 'Nosifer', 'Piedra', 'Metal Mania', 'Henny Penny', 'Shojumaru', 'Gloria Hallelujah', 'Bangers', 'Fredericka the Great', 'Finger Paint', 'Frijole', 'Eater', 'Cabin Sketch', 'Arizonia', 'Codystar', 'Rubik Moonrocks', 'Rubik Burned', 'Rubik Glitch', 'Fascinate Inline', 'Londrina Sketch', 'Rye', 'Black Ops One', 'Staatliches', 'Faster One', 'Audiowide', 'Bungee Shade', 'Flavors', 'Rubik Spray Paint', 'Jolly Lodger', 'New Rocker', 'Butcherman', 'Fontdiner Swanky', 'Jacques Francois Shadow'];
        const brightColors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FF4500', '#32CD32', '#1E90FF', '#FFD700', '#8A2BE2', '#FF69B4'];

        function activateCursorTrail() {
            const handler = (e) => {
                const dot = document.createElement('div');
                dot.className = 'cursor-trail';
                dot.style.left = e.clientX - 5 + 'px';
                dot.style.top = e.clientY - 5 + 'px';
                dot.style.background = brightColors[Math.floor(Math.random() * brightColors.length)];
                document.body.appendChild(dot);
                setTimeout(() => dot.remove(), 800);
            };
            document.addEventListener('mousemove', handler);
            setTimeout(() => document.removeEventListener('mousemove', handler), 3000);
        }

        function shatterEffect(el) {
            const text = el.textContent;
            el.innerHTML = '';
            text.split('').forEach((char, i) => {
                if (char === ' ') { el.appendChild(document.createTextNode(' ')); return; }
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.setProperty('--tx', `${(Math.random() - 0.5) * 400}px`);
                span.style.setProperty('--ty', `${(Math.random() - 0.5) * 400}px`);
                span.style.setProperty('--r', `${Math.random() * 720 - 360}deg`);
                span.style.animation = 'shatter 0.6s ease-out forwards';
                el.appendChild(span);
            });
            setTimeout(() => {
                el.querySelectorAll('span').forEach(span => {
                    span.style.animation = 'rebuild 0.6s ease-out forwards';
                });
            }, 600);
        }

        function neonFlickerEffect(el) {
            el.style.animation = 'neonFlicker 1.5s ease-in-out';
            setTimeout(() => el.style.animation = '', 1500);
        }

        function gravityDropEffect(el) {
            const text = el.textContent;
            el.innerHTML = '';
            text.split('').forEach((char, i) => {
                if (char === ' ') { el.appendChild(document.createTextNode(' ')); return; }
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.animation = `gravityDrop 1s ease-out ${i * 0.05}s both`;
                el.appendChild(span);
            });
        }

        function elasticBounceEffect(el) {
            el.style.animation = 'elasticBounce 0.8s ease-in-out';
            setTimeout(() => el.style.animation = '', 800);
        }

        function magneticPullEffect(el) {
            const text = el.textContent;
            el.innerHTML = '';
            text.split('').forEach((char, i) => {
                if (char === ' ') { el.appendChild(document.createTextNode(' ')); return; }
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.animation = `magneticPull 0.6s ease-in-out ${i * 0.05}s`;
                el.appendChild(span);
            });
        }

        function typewriterEffect(el, text, font, colors) {
            el.innerHTML = '';
            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    if (text[i] === ' ') {
                        el.appendChild(document.createTextNode(' '));
                    } else {
                        const span = document.createElement('span');
                        span.textContent = text[i];
                        span.style.color = colors[i % colors.length];
                        el.appendChild(span);
                    }
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 50);
        }

        function explosionRebuildEffect(el) {
            const text = el.textContent;
            const colors = text.split('').map(() => brightColors[Math.floor(Math.random() * brightColors.length)]);
            el.innerHTML = '';
            text.split('').forEach((char, i) => {
                if (char === ' ') { el.appendChild(document.createTextNode(' ')); return; }
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.color = colors[i];
                span.style.setProperty('--tx', `${(Math.random() - 0.5) * 600}px`);
                span.style.setProperty('--ty', `${(Math.random() - 0.5) * 600}px`);
                span.style.setProperty('--r', `${Math.random() * 1080}deg`);
                span.style.animation = 'shatter 0.8s ease-out forwards';
                el.appendChild(span);
            });
            setTimeout(() => {
                el.querySelectorAll('span').forEach((span, i) => {
                    span.style.animation = 'rebuild 1s ease-out forwards';
                    span.style.animationDelay = `${i * 0.05}s`;
                });
            }, 800);
        }

        function spinDisappearEffect(el) {
            const text = el.textContent;
            el.innerHTML = '';
            text.split('').forEach((char, i) => {
                if (char === ' ') { el.appendChild(document.createTextNode(' ')); return; }
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.animation = `spinDisappear 1s ease-in-out ${i * 0.05}s forwards`;
                el.appendChild(span);
            });
            setTimeout(() => {
                el.querySelectorAll('span').forEach((span, i) => {
                    span.style.animation = `spinReappear 1s ease-in-out ${i * 0.05}s forwards`;
                });
            }, 1000);
        }

        function waveEffect(el) {
            const text = el.textContent;
            el.innerHTML = '';
            text.split('').forEach((char, i) => {
                if (char === ' ') { el.appendChild(document.createTextNode(' ')); return; }
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.animation = `waveEffect 1s ease-in-out ${i * 0.1}s`;
                el.appendChild(span);
            });
        }

        function scrambleName() {
            const el = document.getElementById('name-heading');

            // Re-assign colors
            currentScrambledColors = originalNameText.split('').map(char =>
                char === ' ' ? 'transparent' : brightColors[Math.floor(Math.random() * brightColors.length)]
            );

            el.textContent = originalNameText;

            const effects = [
                () => {
                    el.innerHTML = originalNameText.split('').map((char, i) =>
                        char === ' ' ? ' ' : `<span style="color:${currentScrambledColors[i]}">${char}</span>`
                    ).join('');
                },
                () => shatterEffect(el),
                () => neonFlickerEffect(el),
                () => gravityDropEffect(el),
                () => elasticBounceEffect(el),
                () => magneticPullEffect(el),
                () => typewriterEffect(el, originalNameText, '', currentScrambledColors),
                () => explosionRebuildEffect(el),
                () => spinDisappearEffect(el),
                () => waveEffect(el)
            ];

            effects[Math.floor(Math.random() * effects.length)]();
            activateCursorTrail();

            // Apply colors to any span created
            setTimeout(() => {
                el.querySelectorAll('span').forEach((span, i) => {
                    if (span.textContent !== ' ') {
                        span.style.color = currentScrambledColors[i % currentScrambledColors.length];
                    }
                });
            }, 50);

            const rect = el.getBoundingClientRect();
            confetti({
                particleCount: 150,
                spread: 70,
                origin: {
                    x: (rect.left + rect.width / 2) / window.innerWidth,
                    y: (rect.top + rect.height / 2) / window.innerHeight
                }
            });
            setTimeout(() => {
                el.style.animation = '';
                el.innerHTML = getWiggledNameHTML();
            }, 3000);
        }

        const subtitleRoles = ["COPYWRITER", "/SCREENWRITER", "/AUTHOR", "/DATA ANALYST", "/PODCASTER", "/STAND-UP COMEDIAN", "/AMATEUR CHEF", "/STAR OF ST. ROSE ELEMENTARY'S 2017 SMASH-HIT, SOLD-OUT PRODUCTION \"ANNIE JR\"", "/FUTURE SEXIEST MAN ALIVE", "/LIFE OF THE PARTY", "/NOT YOUR AVERAGE JOE"];
        let roleIndex = 0;

        function cycleSubtitle() {
            roleIndex = (roleIndex + 1) % subtitleRoles.length;
            const subtitle = document.getElementById('subtitle-heading');
            if (roleIndex === 0) {
                subtitle.innerHTML = subtitleRoles[0];
            } else {
                subtitle.innerHTML += `<span>${subtitleRoles[roleIndex]}</span>`;
            }
        }

        // Track which media items are images (for lightbox) and their indices
        function getImageMediaList(mediaArr) {
            return mediaArr
                .map((item, i) => ({ ...item, originalIndex: i }))
                .filter(item => item.type === 'image');
        }

        function openLightbox(src, imageList, imageListIndex) {
            currentMediaList = imageList;
            currentMediaIndex = imageListIndex;
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function changeLightbox(dir, e) {
            if (e) e.stopPropagation();
            currentMediaIndex = (currentMediaIndex + dir + currentMediaList.length) % currentMediaList.length;
            document.getElementById('lightbox-img').src = currentMediaList[currentMediaIndex].src;
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        function generateHeader() {
            const themeClass = getTheme() === 'light' ? 'moon' : 'sun';
            return `
                <header class="site-header">
                    <div>
                        <h1 id="name-heading" onclick="scrambleName()" class="text-4xl font-bold uppercase tracking-[0.2em]">${getWiggledNameHTML()}</h1>
                        <div class="mt-2"><p id="subtitle-heading" onclick="cycleSubtitle()" class="text-xs italic tracking-widest uppercase">COPYWRITER</p></div>
                    </div>
                    <div class="header-right">
                        <nav class="top-nav">
                            <button onclick="showGrid()" class="nav-link font-bold underline decoration-2 underline-offset-8">WORK</button>
                            <a href="Play_section.html" onclick="navigateTo('Play_section.html', event)" class="nav-link font-normal">PLAY</a>
                            <a href="about.html" onclick="navigateTo('about.html', event)" class="nav-link font-normal">ABOUT</a>
                            <a href="resume.html" onclick="navigateTo('resume.html', event)" class="nav-link font-normal">RESUME</a>
                        </nav>
                        <span class="theme-toggle ${themeClass}" onclick="toggleTheme()" title="Toggle theme"></span>
                    </div>
                </header>
            `;
        }

        function showGrid() {
            const area = document.getElementById('main-content-area');
            area.classList.add('fade-out');
            setTimeout(() => {
                let html = generateHeader() + `
                    <main id="work" class="max-w-[90%] mx-auto pt-8 pb-40 px-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                `;
                projects.forEach((p, i) => {
                    html += `
                        <div class="scene-card group" onclick="loadProject(${i})">
                            <div class="aspect-video overflow-hidden">
                                <img src="${p.thumbnail}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700" loading="lazy" alt="${p.title}">
                                <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-30 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                    <h3 class="font-bold uppercase text-2xl tracking-widest text-white text-center px-4">${p.title}</h3>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></main>`;
                area.innerHTML = html;
                area.classList.remove('fade-out');
                window.scrollTo(0, 0);
            }, 400);
        }

        function loadProject(index) {
            const area = document.getElementById('main-content-area');
            const data = projects[index];
            const imageOnlyList = getImageMediaList(data.media);
            area.classList.add('fade-out');
            setTimeout(() => {
                let html = generateHeader() + `
                    <div class="max-w-5xl mx-auto px-6 pt-4 pb-20">
                        <h1 class="text-4xl md:text-6xl font-bold uppercase mb-4 tracking-tighter">${data.title}</h1>
                        <p class="text-xl md:text-2xl italic mb-4 opacity-80">${data.subtitle}</p>
                        ${data.credit ? `<p class="text-sm mb-6 italic opacity-60">${data.credit}</p>` : '<div class="mb-6"></div>'}
                        <div class="script-body mb-12 text-base md:text-lg leading-relaxed inter-text">${data.script}</div>
                        <div class="flex flex-col items-center">
                `;

                let imgCounter = 0;
                let lastGroup = null;
                data.media.forEach((item, mIdx) => {
                    if (item.group && item.group !== lastGroup) {
                        html += `<div class="w-full media-group-header"><h3 class="text-sm font-bold uppercase tracking-[0.25em] pb-2 mb-8 border-b-2" style="border-color: var(--ink-color);">${item.group}</h3></div>`;
                        lastGroup = item.group;
                    }
                    html += `<div class="media-container">`;

                    if (item.type === 'vimeo') {
                        html += `
                            <div class="vimeo-wrapper">
                                <div class="vimeo-embed">
                                    <iframe src="${item.src}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                                </div>
                            </div>
                        `;
                    } else if (item.type === 'image') {
                        let customClass = '';
                        if (data.title === "THE ZOOM REVEAL") customClass = 'zoom-reveal';
                        else if (item.orientation === 'v') customClass = 'contained-vertical';
                        else if (item.orientation === 'h') customClass = 'expanded-horizontal';
                        else if (data.title === "THE HUMAN REVOLUTION") customClass = 'contained-vertical';
                        const thisImgIndex = imgCounter;
                        html += `<img src="${item.src}" class="project-media ${customClass}" onclick="openLightbox('${item.src}', getImageMediaList(projects[${index}].media), ${thisImgIndex})" loading="lazy" alt="Project image ${mIdx + 1}">`;
                        imgCounter++;
                    } else {
                        html += `<video src="${item.src}" class="project-media" autoplay loop muted playsinline controls></video>`;
                    }

                    html += `</div>`;
                });

                const nextIndex = (index + 1) % projects.length;
                html += `</div>
                    <div class="mt-40 pt-16 border-t border-opacity-20 flex flex-col items-center gap-8" style="border-color: var(--ink-color);">
                        <button onclick="showGrid()" class="text-sm font-bold uppercase tracking-widest hover:underline">→ BACK TO WORK</button>
                        <button onclick="loadProject(${nextIndex})" class="text-2xl md:text-3xl font-bold uppercase tracking-widest hover:underline text-center px-4">${projects[nextIndex].title} →</button>
                    </div>
                </div>`;

                area.innerHTML = html;
                area.classList.remove('fade-out');
                window.scrollTo(0, 0);
            }, 400);
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 500);
            }, 300);
        });

        window.onload = showGrid;
    </script>
</body>

</html>
